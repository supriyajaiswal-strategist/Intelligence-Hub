<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spyne Intelligence Hub · Westgate Honda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #f7f8fa;
    --surface-0: #ffffff;
    --surface-1: #fbfbfd;
    --surface-2: #f1f3f6;
    --surface-3: #e6e9ee;
    --border: #e6e8ec;
    --border-strong: #d4d8de;
    --text-1: #0c1220;
    --text-2: #4b5462;
    --text-3: #8a93a3;
    --text-4: #b7bdc8;
    --accent: #6c3aed;
    --accent-2: #8b5cf6;
    --accent-soft: rgba(108,58,237,0.08);
    --accent-border: rgba(108,58,237,0.22);
    --good: #0e9f6e;
    --good-soft: rgba(14,159,110,0.10);
    --warn: #d97706;
    --warn-soft: rgba(217,119,6,0.10);
    --bad: #dc2626;
    --bad-soft: rgba(220,38,38,0.10);
    --info: #2563eb;
    --info-soft: rgba(37,99,235,0.10);
    --shadow-sm: 0 1px 2px rgba(12,18,32,0.04);
    --shadow-md: 0 6px 18px rgba(12,18,32,0.07);
    --shadow-lg: 0 14px 38px rgba(12,18,32,0.10);
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg); color: var(--text-1); font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Monaco, monospace; font-variant-numeric: tabular-nums; }

  /* Filter strip */
  .filter-strip {
    position: sticky; top: 0; z-index: 30;
    background: var(--surface-0);
    border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 46px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px;
  }
  .fl-left { display: flex; align-items: center; gap: 18px; }
  .fl-logo { display: flex; align-items: center; gap: 9px; font-weight: 600; color: var(--text-1); font-size: 13.5px; letter-spacing: -0.2px; }
  .fl-logo-mark { width: 22px; height: 22px; border-radius: 5px; background: var(--accent); display: flex; align-items: center; justify-content: center; }
  .fl-divider { width: 1px; height: 18px; background: var(--border-strong); }
  .fl-store { display: flex; align-items: center; gap: 5px; color: var(--text-2); }
  .fl-store strong { color: var(--text-1); font-weight: 600; }
  .int-chips { display: flex; align-items: center; gap: 5px; }
  .int-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 500;
    background: var(--good-soft); color: var(--good); cursor: pointer; user-select: none;
    transition: all .15s;
  }
  .int-chip.off { background: var(--surface-2); color: var(--text-3); }
  .int-chip .d { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .cov-pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 4px 11px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent);
    font-size: 11px; font-weight: 600; letter-spacing: 0.3px; cursor: pointer;
  }
  .cov-pill.partial { background: var(--warn-soft); color: var(--warn); }

  /* Dropdown */
  .fl-dropdown {
    position: absolute; top: 50px; right: 32px;
    background: var(--surface-0);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    width: 360px; padding: 14px; z-index: 40;
  }
  .fl-dropdown h4 { margin: 0 0 3px; font-size: 13px; font-weight: 600; }
  .fl-dropdown .sub { font-size: 11.5px; color: var(--text-2); margin-bottom: 12px; }
  .tg-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-top: 1px solid var(--border); }
  .tg-row:first-of-type { border-top: none; }
  .tg-info .name { font-size: 12.5px; font-weight: 500; color: var(--text-1); }
  .tg-info .desc { font-size: 10.5px; color: var(--text-3); margin-top: 1px; }
  .tg { position: relative; width: 32px; height: 18px; border-radius: 999px; background: var(--surface-3); cursor: pointer; }
  .tg.on { background: var(--accent); }
  .tg::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: white; transition: transform .15s; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
  .tg.on::after { transform: translateX(14px); }

  /* Page */
  .page { max-width: 1480px; margin: 0 auto; padding: 22px 32px 60px; display: flex; flex-direction: column; gap: 16px; }

  /* Greeting */
  .greet { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 2px; }
  .greet h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; margin: 0; color: var(--text-1); }
  .greet .sub { font-size: 12.5px; color: var(--text-2); margin-top: 3px; }
  .greet .sub strong { color: var(--text-1); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; background: var(--accent); color: white; border: none; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; transition: background .15s; }
  .btn:hover { background: #5a2bd6; }
  .btn.ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border-strong); }
  .btn.ghost:hover { background: var(--surface-2); color: var(--text-1); }
  .btn.sm { padding: 4px 10px; font-size: 11px; }
  .btn.xs { padding: 3px 8px; font-size: 11px; }

  /* Pulse */
  .pulse {
    display: grid; grid-template-columns: 1fr 1fr 1.3fr 1fr 1fr; gap: 1px;
    background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  }
  .pulse-tile { background: var(--surface-0); padding: 16px 18px; min-height: 124px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
  .pulse-tile.hero { background: linear-gradient(135deg, #ffffff, #faf7ff); }
  .p-label { font-size: 10.5px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.6px; }
  .p-value { font-size: 30px; font-weight: 500; color: var(--text-1); letter-spacing: -1px; line-height: 1; margin-top: 8px; }
  .p-value.hero { font-size: 38px; color: var(--accent); }
  .p-value .of { color: var(--text-3); font-size: 13px; font-weight: 400; }
  .p-sub { font-size: 11.5px; color: var(--text-2); margin-top: 6px; }
  .p-bar { height: 5px; background: var(--surface-2); border-radius: 3px; margin-top: 10px; position: relative; }
  .p-bar-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 3px; }
  .p-bar-mark { position: absolute; top: -2px; width: 2px; height: 9px; background: var(--text-1); }
  .live { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 5px; animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .today { display: flex; gap: 12px; }
  .today-it { display: flex; flex-direction: column; }
  .today-n { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 500; color: var(--text-1); }
  .today-l { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px; }

  /* Trajectory */
  .trajectory {
    background: var(--surface-0); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 18px; display: grid; grid-template-columns: auto 1fr 1fr 1fr 1fr; gap: 28px; align-items: center;
  }
  .traj-head { display: flex; flex-direction: column; gap: 1px; }
  .traj-head .lbl { font-size: 10.5px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.6px; }
  .traj-head .sub { font-size: 11px; color: var(--text-3); }
  .traj-it { display: flex; flex-direction: column; gap: 1px; }
  .traj-it .name { font-size: 10.5px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.4px; font-weight: 500; }
  .traj-it .change { display: flex; align-items: baseline; gap: 6px; }
  .traj-it .from { font-family: 'JetBrains Mono', monospace; color: var(--text-3); font-size: 12px; }
  .traj-it .to { font-family: 'JetBrains Mono', monospace; color: var(--text-1); font-size: 16px; font-weight: 500; }
  .traj-it .delta { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 600; padding: 1px 5px; border-radius: 3px; }
  .traj-it .delta.good { background: var(--good-soft); color: var(--good); }
  .traj-it .delta.warn { background: var(--warn-soft); color: var(--warn); }

  /* Spotted */
  .spotted {
    background: linear-gradient(90deg, var(--accent-soft), rgba(108,58,237,0.02));
    border: 1px solid var(--accent-border); border-radius: var(--radius);
    padding: 11px 18px; display: flex; align-items: center; gap: 14px; font-size: 13px; cursor: pointer;
    transition: background .15s;
  }
  .spotted:hover { background: linear-gradient(90deg, var(--accent-soft), rgba(108,58,237,0.05)); }
  .sp-icon { width: 22px; height: 22px; border-radius: 5px; background: var(--accent); color: white; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sp-lbl { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.7px; }
  .sp-text { color: var(--text-1); font-weight: 500; }
  .sp-val { color: var(--good); font-weight: 600; }
  .sp-mini { display: inline-flex; align-items: end; gap: 2px; height: 14px; }
  .sp-mini span { width: 4px; background: var(--accent); border-radius: 1px; }

  /* Journey container */
  .journey-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(--surface-0); border: 1px solid var(--border); border-bottom: none; border-radius: var(--radius) var(--radius) 0 0; }
  .journey-title { display: flex; align-items: center; gap: 10px; }
  .journey-title .lbl { font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.7px; }
  .journey-title .central { font-size: 13px; font-weight: 600; color: var(--text-1); }
  .journey-title .central span { font-family: 'JetBrains Mono', monospace; color: var(--accent); }
  .journey-meta { font-size: 11.5px; color: var(--text-3); }
  .journey-meta strong { color: var(--text-1); }

  .journey {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 0;
    background: var(--surface-0); border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 var(--radius) var(--radius); overflow: hidden;
  }
  .stage {
    padding: 18px 16px; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 12px;
    cursor: pointer; transition: background .15s; position: relative;
  }
  .stage:last-child { border-right: none; }
  .stage:hover { background: var(--surface-1); }
  .stage.flagged::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  }
  .stage.bad::before { background: var(--bad); }
  .stage.warn::before { background: var(--warn); }
  .stage.good::before { background: var(--good); }

  .st-head { display: flex; align-items: center; justify-content: space-between; }
  .st-name { display: flex; flex-direction: column; gap: 1px; }
  .st-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-4); font-weight: 600; }
  .st-title { font-size: 13px; font-weight: 600; color: var(--text-1); letter-spacing: -0.1px; }
  .st-dot { width: 10px; height: 10px; border-radius: 50%; }
  .st-dot.bad { background: var(--bad); box-shadow: 0 0 0 3px var(--bad-soft); }
  .st-dot.warn { background: var(--warn); box-shadow: 0 0 0 3px var(--warn-soft); }
  .st-dot.good { background: var(--good); box-shadow: 0 0 0 3px var(--good-soft); }

  .st-tat { display: flex; flex-direction: column; gap: 3px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .st-tat-row { display: flex; align-items: baseline; gap: 8px; }
  .st-tat-val { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 500; letter-spacing: -0.5px; line-height: 1; }
  .st-tat-val.bad { color: var(--bad); }
  .st-tat-val.warn { color: var(--warn); }
  .st-tat-val.good { color: var(--good); }
  .st-tat-target { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-3); }
  .st-tat-delta { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; }
  .st-tat-delta.bad { color: var(--bad); }
  .st-tat-delta.warn { color: var(--warn); }
  .st-tat-delta.good { color: var(--good); }
  .st-tat-bar { height: 4px; background: var(--surface-2); border-radius: 2px; position: relative; margin-top: 4px; }
  .st-tat-bar-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 2px; }
  .st-tat-bar-mark { position: absolute; top: -1px; width: 2px; height: 6px; background: var(--text-1); }

  .st-viz { min-height: 86px; }
  .vz-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 6px; }
  .vz-row { display: grid; grid-template-columns: 60px 1fr 32px; gap: 6px; align-items: center; padding: 3px 0; font-size: 11px; }
  .vz-row .lbl { color: var(--text-2); }
  .vz-row .bar { height: 7px; border-radius: 2px; background: var(--surface-2); position: relative; overflow: hidden; }
  .vz-row .bar-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 2px; }
  .vz-row .val { font-family: 'JetBrains Mono', monospace; text-align: right; font-weight: 500; font-size: 11px; }
  .vz-row .val.bad { color: var(--bad); }
  .vz-row .val.warn { color: var(--warn); }
  .vz-row .val.good { color: var(--good); }

  /* Recon stage mini progression */
  .pipeline { display: flex; gap: 3px; padding: 4px 0; }
  .pipe-stage { flex: 1; padding: 6px 4px; background: var(--surface-2); border-radius: 4px; text-align: center; position: relative; }
  .pipe-stage.bottleneck { background: var(--bad-soft); border: 1px solid var(--bad); }
  .pipe-stage .pname { font-size: 9px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600; }
  .pipe-stage .pcount { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text-1); margin-top: 2px; }
  .pipe-stage.bottleneck .pcount { color: var(--bad); }

  /* Histogram */
  .histo { display: flex; gap: 2px; align-items: end; height: 50px; padding-top: 6px; }
  .histo-bar { flex: 1; border-radius: 2px 2px 0 0; position: relative; display: flex; flex-direction: column; justify-content: end; min-height: 2px; }
  .histo-labels { display: flex; gap: 2px; margin-top: 4px; }
  .histo-labels span { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-3); text-align: center; }

  /* Funnel mini */
  .funnel-mini { display: flex; flex-direction: column; gap: 2px; }
  .fm-row { display: grid; grid-template-columns: 36px 1fr 36px; gap: 6px; align-items: center; font-size: 10.5px; }
  .fm-row .name { color: var(--text-2); font-size: 10.5px; }
  .fm-row .bar { height: 8px; background: var(--surface-2); border-radius: 2px; overflow: hidden; }
  .fm-row .bar-fill { height: 100%; }
  .fm-row .pct { font-family: 'JetBrains Mono', monospace; text-align: right; font-weight: 500; font-size: 10.5px; }
  .fm-row.worst .pct { color: var(--bad); font-weight: 600; }

  /* Queue */
  .queue { display: flex; flex-direction: column; gap: 4px; }
  .q-row { display: grid; grid-template-columns: 60px 1fr 24px; gap: 6px; align-items: center; font-size: 11px; padding: 3px 0; }
  .q-row .seg { color: var(--text-2); }
  .q-row .stat { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-3); }
  .q-row .pip { display: flex; gap: 2px; }
  .q-row .pip span { width: 6px; height: 6px; border-radius: 50%; background: var(--surface-3); }
  .q-row .pip span.full { background: var(--good); }
  .q-row .pip span.mid { background: var(--warn); }
  .q-row .pip span.empty { background: var(--bad); }
  .q-row .dot { width: 8px; height: 8px; border-radius: 50%; justify-self: center; }
  .q-row .dot.bad { background: var(--bad); }
  .q-row .dot.warn { background: var(--warn); }
  .q-row .dot.good { background: var(--good); }

  .st-foot { display: flex; align-items: center; justify-content: space-between; padding-top: 8px; border-top: 1px solid var(--border); margin-top: auto; }
  .st-cost { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--bad); }
  .st-action { font-size: 11px; color: var(--accent); font-weight: 600; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
  .st-action:hover { text-decoration: underline; }

  /* Locked overlay */
  .lockover { position: absolute; inset: 0; background: rgba(255,255,255,0.78); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; z-index: 5; padding: 14px; }
  .lockcard { background: var(--surface-0); border: 1px solid var(--border-strong); border-radius: 8px; padding: 14px; max-width: 240px; box-shadow: var(--shadow-md); text-align: center; }
  .lockcard svg { width: 18px; height: 18px; color: var(--text-2); margin-bottom: 6px; }
  .lockcard h5 { margin: 0 0 4px; font-size: 12.5px; font-weight: 600; color: var(--text-1); }
  .lockcard p { margin: 0 0 10px; font-size: 11px; color: var(--text-2); line-height: 1.4; }
  .lockcard .est { display: inline-block; padding: 2px 7px; border-radius: 4px; background: var(--accent-soft); color: var(--accent); font-size: 10.5px; font-weight: 600; margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; }

  /* Top 3 */
  .top3-wrap { background: var(--surface-0); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .top3-head { padding: 12px 18px; background: var(--surface-1); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .top3-h-l { display: flex; align-items: center; gap: 10px; }
  .top3-h-l .lbl { font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.7px; }
  .top3-h-l .pill { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; background: var(--accent-soft); color: var(--accent); padding: 2px 7px; border-radius: 999px; font-weight: 600; }
  .top3-row {
    display: grid;
    grid-template-columns: 22px 90px 60px minmax(180px, 1.3fr) minmax(260px, 2fr) 90px 32px 130px;
    gap: 12px; padding: 13px 18px; align-items: center; border-bottom: 1px solid var(--border);
    transition: background .12s;
  }
  .top3-row:last-of-type { border-bottom: none; }
  .top3-row:hover { background: var(--surface-1); }
  .t3-rank { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-3); }
  .t3-stage { font-size: 10px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 7px; background: var(--accent-soft); border-radius: 4px; text-align: center; }
  .t3-pri { display: inline-flex; align-items: center; gap: 5px; }
  .t3-pri .d { width: 8px; height: 8px; border-radius: 50%; }
  .t3-pri.bad .d { background: var(--bad); box-shadow: 0 0 0 3px var(--bad-soft); }
  .t3-pri.warn .d { background: var(--warn); box-shadow: 0 0 0 3px var(--warn-soft); }
  .t3-pri .lbl { font-size: 10px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.4px; }
  .t3-what { font-size: 12.5px; color: var(--text-1); font-weight: 500; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip { display: inline-flex; align-items: center; padding: 2px 7px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; font-size: 10.5px; color: var(--text-2); font-family: 'JetBrains Mono', monospace; }
  .chip.bad { background: var(--bad-soft); color: var(--bad); border-color: rgba(220,38,38,0.18); }
  .chip.warn { background: var(--warn-soft); color: var(--warn); border-color: rgba(217,119,6,0.18); }
  .chip.good { background: var(--good-soft); color: var(--good); border-color: rgba(14,159,110,0.18); }
  .t3-money { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; color: var(--bad); text-align: right; }
  .avatar { width: 26px; height: 26px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: white; }

        <div className="today" style={{marginTop:8}}>
          <div className="today-it"><div className="today-n">{PULSE.todaySold}</div><div className="today-l">Sold</div></div>
          <div className="today-it"><div className="today-n">{PULSE.todayLeads}</div><div className="today-l">Leads</div></div>
          <div className="today-it"><div className="today-n">{PULSE.todayUps}</div><div className="today-l">Ups</div></div>
        </div>
      </div>
      <div className="p-sub">vs {PULSE.ySold}·{PULSE.yLeads}·{PULSE.yUps} yesterday</div>
    </div>
  </div>
);

/* ============================================================
   TRAJECTORY
============================================================ */
const Trajectory = () => (
  <div className="trajectory">
    <div className="traj-head">
      <span className="lbl">↗ Your trajectory · 4 months on Spyne</span>
      <span className="sub">since Nov 2025</span>
    </div>
    {TRAJECTORY.map((t, i) => (
      <div key={i} className="traj-it">
        <span className="name">{t.name}</span>
        <div className="change">
          <span className="from">{t.from}</span>
          <span style={{color:'var(--text-3)'}}>→</span>
          <span className="to">{t.to}</span>
          <span className={`delta ${t.tone}`}>{t.delta}</span>
        </div>
      </div>
    ))}
  </div>
);

/* ============================================================
   SPOTTED
============================================================ */
const Spotted = ({ integrations }) => {
  if (!integrations.studio) return null;
  return (
    <div className="spotted">
      <span className="sp-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4-6.2-4.5-6.2 4.5 2.4-7.4L2 9.4h7.6z"/></svg>
      </span>
      <span className="sp-lbl">Spyne Spotted</span>
      <span className="sp-text">{SPOTTED.pattern}</span>
      <span className="sp-mini"><span style={{height:'13px'}}/><span style={{height:'5px'}}/></span>
      <span className="sp-val">{SPOTTED.impact}</span>
      <span style={{marginLeft:'auto',fontSize:11,color:'var(--text-3)',fontWeight:500}}>view ▶</span>
    </div>
  );
};

/* ============================================================
   JOURNEY
============================================================ */
const Journey = ({ integrations, onStageClick }) => (
  <div>
    <div className="journey-head">
      <div className="journey-title">
        <span className="lbl">Time-to-Sell Journey</span>
        <span className="central">Central metric · <span>{PULSE.timeToSell}d avg</span></span>
      </div>
      <span className="journey-meta">2 stages on target · 3 warn · 1 critical · <strong>tap any stage for deep-dive</strong></span>
    </div>
    <div className="journey">
      {STAGES.map(s => (
        <StageCard key={s.key} stage={s} integrations={integrations} onClick={() => onStageClick(s)}/>
      ))}
    </div>
  </div>
);

/* ============================================================
   TOP 3
============================================================ */
const Top3 = () => {
  const total = TOP3.reduce((s,a) => s + a.money, 0);
  return (
    <div className="top3-wrap">
      <div className="top3-head">
        <div className="top3-h-l">
          <span className="lbl">Today's Top 3 · recovery actions</span>
          <span className="pill">${total.toLocaleString()} recoverable</span>
        </div>
        <button className="btn ghost sm">Customize ▾</button>
      </div>
      {TOP3.map(a => (
        <div key={a.rank} className="top3-row">
          <span className="t3-rank">#{a.rank}</span>
          <span className="t3-stage">{a.stage}</span>
          <span className={`t3-pri ${a.priority}`}>
            <span className="d"/><span className="lbl">{a.priority==='bad'?'high':'med'}</span>
          </span>
          <span className="t3-what">{a.what}</span>
          <span className="chips">
            {a.chips.map((c,i) => <span key={i} className={`chip ${c.tone!=='normal'?c.tone:''}`}>{c.label}</span>)}
          </span>
          <span className="t3-money">${a.money.toLocaleString()}</span>
          <Avatar i={a.owner.i} c={a.owner.c}/>
          <button className="btn">{a.action} →</button>
        </div>
      ))}
      <div className="top3-foot">
        <span>Total recoverable today: <span className="total">${total.toLocaleString()}</span> · Auto-safe ready: <strong>2 / 3</strong></span>
        <button className="btn ghost sm">Run safe actions</button>
      </div>
    </div>
  );
};

/* ============================================================
   BIG MOVE
============================================================ */
const BigMove = () => (
  <div className="bm">
    <div className="bm-l">
      <span className="bm-tag">↑ Big Move · this week</span>
      <div className="bm-head">{BIG_MOVE.title}</div>
      <div className="bm-sub">{BIG_MOVE.sub}</div>
      <div className="bm-chips">
        <span className="bm-chip">leads {BIG_MOVE.leads}</span>
        <span className="bm-chip">stock {BIG_MOVE.stock}</span>
        <span className="bm-chip">supply you {BIG_MOVE.supplyYou}d · market {BIG_MOVE.supplyMarket}d</span>
        <span className="bm-chip">{BIG_MOVE.candidates} lane candidates</span>
      </div>
      <div className="bm-actions" style={{marginTop: 10}}>
        <button className="btn">Open buy list</button>
        <button className="btn ghost">Lane preview</button>
      </div>
    </div>
    <div className="bm-r">
      {BIG_MOVE.impact.map((c,i) => (
        <div key={i} className="bm-stat">
          <div className="v">{c.v}</div>
          <div className="l">{c.l}</div>
        </div>
      ))}
    </div>
  </div>
);

/* ============================================================
   FILTER
============================================================ */
const FilterStrip = ({ integrations, setIntegrations, ddOpen, setDdOpen }) => {
  const onCount = Object.values(integrations).filter(v => v).length;
  const coverage = Math.round((onCount / Object.keys(integrations).length) * 100);
  const toggle = (k) => setIntegrations(prev => ({...prev, [k]: !prev[k]}));
  return (
    <>
      <div className="filter-strip">
        <div className="fl-left">
          <div className="fl-logo">
            <span className="fl-logo-mark">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3" opacity="0.85"/><circle cx="6" cy="18" r="3" opacity="0.85"/><circle cx="18" cy="18" r="3" opacity="0.7"/></svg>
            </span>
            <span>Spyne Intelligence Hub</span>
          </div>
          <div className="fl-divider"/>
          <div className="fl-store"><strong>{STORE.name}</strong> · {STORE.location}</div>
        </div>
        <div className="fl-left">
          <div className="int-chips">
            {Object.keys(integrations).map(k => (
              <span key={k} className={`int-chip ${integrations[k]?'':'off'}`} onClick={() => toggle(k)}>
                <span className="d"/>{INT_LABELS[k]}
              </span>
            ))}
          </div>
          <div className="fl-divider"/>
          <span className={`cov-pill ${coverage<100?'partial':''}`} onClick={() => setDdOpen(!ddOpen)}>Coverage {coverage}% ▾</span>
        </div>
      </div>
      {ddOpen && (
        <div className="fl-dropdown">
          <h4>Integration status</h4>
          <div className="sub">Toggle to preview how the dashboard changes. Sales reps use this in demos.</div>
          {Object.keys(integrations).map(k => (
            <div key={k} className="tg-row">
              <div className="tg-info">
                <span className="name">{INT_LABELS[k]}</span>
                <span className="desc">{INT_DESC[k]}</span>
              </div>
              <span className={`tg ${integrations[k]?'on':''}`} onClick={() => toggle(k)}/>
            </div>
          ))}
        </div>
      )}
    </>
  );
};

/* ============================================================
   APP
============================================================ */
const App = () => {
  const [integrations, setIntegrations] = useState({
    studio: true, vini: true, dms: true, crm: true, market: true, web: true,
  });
  const [ddOpen, setDdOpen] = useState(false);
  const [drawerStage, setDrawerStage] = useState(null);

  return (
    <div onClick={(e) => {
      if (ddOpen && !e.target.closest('.fl-dropdown') && !e.target.closest('.cov-pill')) setDdOpen(false);
    }}>
      <FilterStrip integrations={integrations} setIntegrations={setIntegrations} ddOpen={ddOpen} setDdOpen={setDdOpen}/>
      <div className="page">
        <div className="greet">
          <div>
            <h1>Good morning, Marcus</h1>
            <div className="sub">{STORE.date} · <strong>{PULSE.daysLeft} selling days left</strong> · <strong style={{color:'var(--accent)'}}>3 recovery actions</strong> worth <strong>$7,460</strong></div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn ghost">Brief team</button>
            <button className="btn">Morning huddle ▾</button>
          </div>
        </div>

        <Pulse/>
        <Trajectory/>
        <Spotted integrations={integrations}/>
        <Journey integrations={integrations} onStageClick={setDrawerStage}/>
        <Top3/>
        <BigMove/>
      </div>

      {drawerStage && <StageDrawer stage={drawerStage} onClose={() => setDrawerStage(null)}/>}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
